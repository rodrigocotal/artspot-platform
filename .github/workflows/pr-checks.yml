name: PR Checks

on:
  pull_request:
    branches:
      - main
      - develop
  push:
    branches:
      - main
      - develop

jobs:
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm --filter @artspot/api prisma:generate

      - name: Lint (Web)
        run: pnpm --filter @artspot/web lint
        continue-on-error: true

      - name: Lint (API)
        run: pnpm --filter @artspot/api lint
        continue-on-error: true

      - name: Type check (Web)
        run: pnpm --filter @artspot/web type-check
        continue-on-error: true  # React 19 JSX type compat issues; build job validates

      - name: Type check (API)
        run: pnpm --filter @artspot/api type-check

  build:
    name: Build All Packages
    runs-on: ubuntu-latest
    needs: lint-and-typecheck

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm --filter @artspot/api prisma:generate

      - name: Build API
        run: pnpm --filter @artspot/api build
        env:
          DATABASE_URL: postgresql://placeholder:placeholder@localhost:5432/placeholder

      - name: Build Web
        run: pnpm --filter @artspot/web build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:4000
          NEXT_PUBLIC_CLOUDINARY_CLOUD_NAME: placeholder

  api-tests:
    name: API Integration Tests
    runs-on: ubuntu-latest
    needs: lint-and-typecheck

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: artspot_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm --filter @artspot/api prisma:generate

      - name: Run API tests
        run: pnpm --filter @artspot/api test
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://testuser:testpass@localhost:5432/artspot_test?schema=public
          JWT_SECRET: ci-test-jwt-secret
          JWT_REFRESH_SECRET: ci-test-jwt-refresh-secret
          ALLOWED_ORIGINS: '*'

  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [build, api-tests]

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: artspot_e2e
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm --filter @artspot/api prisma:generate

      - name: Push schema to test DB
        run: pnpm --filter @artspot/api exec prisma db push --force-reset --accept-data-loss
        env:
          DATABASE_URL: postgresql://testuser:testpass@localhost:5432/artspot_e2e

      - name: Install Playwright browsers
        run: pnpm --filter @artspot/web test:e2e:install

      - name: Run E2E tests
        run: pnpm --filter @artspot/web test:e2e
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://testuser:testpass@localhost:5432/artspot_e2e
          JWT_SECRET: ci-e2e-jwt-secret
          JWT_REFRESH_SECRET: ci-e2e-jwt-refresh-secret
          ALLOWED_ORIGINS: '*'
          AUTH_SECRET: ci-e2e-auth-secret
          NEXTAUTH_SECRET: ci-e2e-auth-secret
          NEXT_PUBLIC_API_URL: http://localhost:4000
          NEXT_PUBLIC_CLOUDINARY_CLOUD_NAME: placeholder

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 7

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run security audit
        run: pnpm audit --audit-level=high
        continue-on-error: true

  check-status:
    name: All Checks Passed
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck, build, api-tests, e2e-tests, security-scan]
    if: always()

    steps:
      - name: Check status
        run: |
          if [ "${{ needs.lint-and-typecheck.result }}" != "success" ] || \
             [ "${{ needs.build.result }}" != "success" ]; then
            echo "One or more checks failed"
            exit 1
          fi
          echo "All checks passed!"
